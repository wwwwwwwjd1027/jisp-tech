<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JISP Pro 관리자 콘솔</title>
    <style>
        :root {
            --bg-color: #0b0f17;
            --card-bg: #121824;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --border-color: #1e293b;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-container {
            max-width: 800px;
            width: 100%;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fbbf24;
        }
        .badge {
            background: #fbbf24;
            color: #000;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 12px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 14px;
        }
        .btn-approve {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(16,185,129,0.2);
        }
        .btn-approve:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(16,185,129,0.3);
        }
        .btn-approve:active {
            transform: translateY(0);
        }
        .btn-reject {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(239,68,68,0.2);
        }
        .btn-reject:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(239,68,68,0.3);
        }
        .btn-revoke {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
        }
        .btn-revoke:hover {
            border-color: #ef4444;
            color: #f87171;
            background: rgba(239,68,68,0.05);
        }
        .status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .status-pending {
            background: rgba(245,158,11,0.15);
            color: #fbbf24;
        }
        .status-approved {
            background: rgba(16,185,129,0.15);
            color: #34d399;
        }
        .status-rejected {
            background: rgba(239,68,68,0.15);
            color: #f87171;
        }
        .status-cancelled {
            background: rgba(148,163,184,0.15);
            color: #94a3b8;
        }
        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Passcode lock screen overlay -->
    <div id="lock-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0f17; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
        <div style="background: #121824; border: 1px solid #1e293b; padding: 40px; border-radius: 16px; width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center;">
            <div style="font-size: 48px; margin-bottom: 20px;">🔐</div>
            <h2 style="margin: 0 0 10px 0; color: #fbbf24; font-size: 20px;">관리자 인증</h2>
            <p style="color: #94a3b8; font-size: 13px; margin: 0 0 24px 0;">JISP Pro 관리자 콘솔 접근 암호를 입력하세요.</p>
            <input type="password" id="passcode-input" placeholder="비밀번호 입력" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #0b0f17; color: #fff; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; margin-bottom: 16px;">
            <div id="error-message" style="color: #ef4444; font-size: 12px; margin-bottom: 16px; display: none;">❌ 비밀번호가 올바르지 않습니다.</div>
            <button id="unlock-btn" style="width: 100%; background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(37,99,235,0.2);">인증 및 잠금해제</button>
        </div>
    </div>

    <div class="admin-container" id="admin-main-container" style="display: none;">
        <div class="header-row">
            <h1>👑 JISP Pro 관리자 콘솔 <span class="badge">ADMIN</span></h1>
            <div style="font-size:13px; color:var(--text-muted);">대표자: <strong>정지후</strong></div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; margin-bottom: 20px;">📥 입금 승인 대기 목록</h3>
            <table id="deposits-table">
                <thead>
                    <tr>
                        <th>신청 시간</th>
                        <th>입금자명</th>
                        <th>이메일 주소</th>
                        <th>신청 금액</th>
                        <th>상태</th>
                        <th>작업</th>
                    </tr>
                </thead>
                <tbody id="deposits-list">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
            <div id="empty-message" class="empty-state" style="display: none;">
                📭 승인 대기 중인 입금 신청 건이 없습니다.
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
